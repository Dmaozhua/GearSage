<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GearSage 审核后台 v0</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <section id="login-screen" class="screen screen-active">
        <div class="login-card">
          <div class="login-badge">审核后台 v0</div>
          <h1>GearSage 审核后台</h1>
          <p class="muted">最小可演示版本，仅承接审核与治理侧基础动作。</p>
          <form id="login-form" class="login-form">
            <label>
              <span>账号</span>
              <input id="login-username" type="text" autocomplete="username" placeholder="admin" required />
            </label>
            <label>
              <span>密码</span>
              <input id="login-password" type="password" autocomplete="current-password" placeholder="admin123456" required />
            </label>
            <button id="login-submit" type="submit">登录</button>
          </form>
          <div id="login-error" class="form-error hidden"></div>
          <div class="login-hint">
            默认账号来自服务端环境变量：
            <code>ADMIN_DEFAULT_USERNAME</code> /
            <code>ADMIN_DEFAULT_PASSWORD</code>
          </div>
        </div>
      </section>

      <section id="console-screen" class="screen hidden">
        <aside class="sidebar">
          <div class="sidebar-header">
            <div class="brand">GearSage 审核后台</div>
            <div class="env-chip">本地演示</div>
          </div>
          <div class="admin-summary">
            <div id="admin-username" class="admin-name">-</div>
            <div id="admin-role" class="admin-role">-</div>
          </div>
          <nav class="nav-list">
            <button class="nav-item nav-item-active" data-view="topics">帖子审核与下架</button>
            <button class="nav-item" data-view="comments">评论审核</button>
            <button class="nav-item" data-view="reports">举报处理</button>
            <button class="nav-item" data-view="gear-feedback">装备反馈</button>
            <button class="nav-item" data-view="gear-update-requests">装备更新需求</button>
            <button class="nav-item" data-view="users">用户管理</button>
            <button class="nav-item" data-view="logs">审核日志</button>
            <button class="nav-item" data-view="rules">规则配置</button>
          </nav>
          <button id="logout-button" class="secondary ghost">退出登录</button>
        </aside>

        <main class="main-content">
          <header class="topbar">
            <div>
              <h2 id="view-title">帖子审核与下架</h2>
              <div id="view-subtitle" class="muted">查看待审核和已发布帖子；已发布内容可从这里下架。</div>
            </div>
            <div class="topbar-actions">
              <button id="refresh-button" class="secondary">刷新当前页</button>
            </div>
          </header>

          <div id="global-message" class="global-message hidden"></div>

          <section id="view-topics" class="view-section">
            <div class="toolbar">
              <select id="topics-status">
                <option value="pending">待审核</option>
                <option value="2">已发布（可下架）</option>
                <option value="9">已驳回/下架</option>
                <option value="all">全部</option>
              </select>
              <input id="topics-keyword" type="text" placeholder="搜索标题/正文" />
              <button id="topics-search">查询</button>
            </div>
            <div id="topics-table" class="table-shell"></div>
          </section>

          <section id="view-comments" class="view-section hidden">
            <div class="toolbar">
              <select id="comments-status">
                <option value="pending">待审核</option>
                <option value="2">已展示（可隐藏）</option>
                <option value="9">已驳回/删除</option>
                <option value="all">全部</option>
              </select>
              <input id="comments-keyword" type="text" placeholder="搜索评论内容" />
              <button id="comments-search">查询</button>
            </div>
            <div id="comments-table" class="table-shell"></div>
          </section>

          <section id="view-users" class="view-section hidden">
            <div class="toolbar">
              <select id="users-status">
                <option value="all">全部状态</option>
                <option value="0">正常</option>
                <option value="9">封禁</option>
              </select>
              <input id="users-keyword" type="text" placeholder="搜索昵称/手机号" />
              <button id="users-search">查询</button>
            </div>
            <div id="users-table" class="table-shell"></div>
          </section>

          <section id="view-reports" class="view-section hidden">
            <div class="toolbar">
              <select id="reports-status">
                <option value="pending">待处理</option>
                <option value="handled">已处理</option>
                <option value="rejected">已驳回</option>
                <option value="all">全部</option>
              </select>
              <select id="reports-target-type">
                <option value="all">全部对象</option>
                <option value="topic">帖子</option>
                <option value="comment">评论</option>
                <option value="user">用户</option>
              </select>
              <button id="reports-search">查询</button>
            </div>
            <div id="reports-table" class="table-shell"></div>
          </section>

          <section id="view-gear-feedback" class="view-section hidden">
            <div class="toolbar toolbar--gear-feedback">
              <select id="gear-feedback-status">
                <option value="pending">待处理</option>
                <option value="handled">已处理</option>
                <option value="rejected">已驳回</option>
                <option value="all">全部</option>
              </select>
              <select id="gear-feedback-type">
                <option value="all">全部类别</option>
                <option value="reels">渔轮</option>
                <option value="rods">鱼竿</option>
                <option value="lures">路亚饵</option>
                <option value="line">鱼线</option>
                <option value="hook">鱼钩</option>
              </select>
              <select id="gear-feedback-feedback-type">
                <option value="all">全部反馈</option>
                <option value="参数错误">参数错误</option>
                <option value="图片问题">图片问题</option>
                <option value="技术说明错误">技术说明错误</option>
                <option value="型号缺失">型号缺失</option>
                <option value="权利问题">权利问题</option>
                <option value="其他">其他</option>
              </select>
              <button id="gear-feedback-search">查询</button>
            </div>
            <div id="gear-feedback-table" class="table-shell"></div>
          </section>

          <section id="view-gear-update-requests" class="view-section hidden">
            <div class="toolbar toolbar--gear-update">
              <select id="gear-update-status">
                <option value="">待处理/需复核</option>
                <option value="pending">待处理</option>
                <option value="review">需复核</option>
                <option value="accepted">已采纳</option>
                <option value="done">已收录</option>
                <option value="ignored">已忽略</option>
                <option value="all">全部</option>
              </select>
              <select id="gear-update-type">
                <option value="all">全部类型</option>
                <option value="reels">渔轮</option>
                <option value="rods">鱼竿</option>
                <option value="lures">鱼饵</option>
                <option value="other">其他</option>
              </select>
              <button id="gear-update-search">查询</button>
            </div>
            <div id="gear-update-table" class="table-shell"></div>
          </section>

          <section id="view-logs" class="view-section hidden">
            <div class="toolbar">
              <select id="logs-target-type">
                <option value="">全部对象</option>
                <option value="topic">帖子</option>
                <option value="comment">评论</option>
                <option value="report">举报</option>
                <option value="gear_feedback">装备反馈</option>
                <option value="gear_update_request">装备更新需求</option>
                <option value="user">用户</option>
                <option value="moderation_rule">关键词规则</option>
              </select>
              <select id="logs-action">
                <option value="">全部动作</option>
                <option value="topic_pass">通过帖子</option>
                <option value="topic_reject">驳回帖子</option>
                <option value="topic_remove">下架帖子</option>
                <option value="topic_restore">恢复帖子</option>
                <option value="comment_pass">通过评论</option>
                <option value="comment_reject">驳回评论</option>
                <option value="comment_remove">隐藏评论</option>
                <option value="report_accept">认可举报</option>
                <option value="report_handle">标记举报已处理</option>
                <option value="report_reject">驳回举报</option>
                <option value="gear_feedback_handle">处理装备反馈</option>
                <option value="gear_feedback_reject">驳回装备反馈</option>
                <option value="gear_update_request_accept">采纳装备更新需求</option>
                <option value="gear_update_request_done">标记装备已收录</option>
                <option value="gear_update_request_ignore">忽略装备更新需求</option>
                <option value="gear_update_request_status">调整装备更新需求状态</option>
                <option value="user_ban">封禁用户</option>
                <option value="user_unban">解封用户</option>
                <option value="rule_create">新增关键词规则</option>
                <option value="rule_delete">删除关键词规则</option>
              </select>
              <button id="logs-search">查询</button>
            </div>
            <div id="logs-table" class="table-shell"></div>
          </section>

          <section id="view-rules" class="view-section hidden">
            <div class="rule-editor">
              <input id="rule-keyword" type="text" placeholder="输入黑名单词" />
              <input id="rule-remark" type="text" placeholder="备注（可选）" />
              <button id="rule-create">新增规则</button>
            </div>
            <div id="rules-table" class="table-shell"></div>
          </section>
        </main>
      </section>
    </div>

    <div id="detail-drawer" class="drawer hidden">
      <div class="drawer-panel">
        <div class="drawer-header">
          <h3 id="drawer-title">详情</h3>
          <button id="drawer-close" class="icon-button">关闭</button>
        </div>
        <div id="drawer-content" class="drawer-content"></div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
  </html>
